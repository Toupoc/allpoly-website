<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllPoly | Animation & Game Dev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Syncopate:wght@700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- BACKGROUND --- */
        .background-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .grid-overlay {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
        }

        .gradient-sphere {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(123, 31, 162, 0.15) 0%, rgba(0, 188, 212, 0.05) 50%, rgba(5, 5, 5, 0) 70%);
            filter: blur(80px);
            animation: pulse 10s infinite alternate;
        }

        .accent {
            position: fixed;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100px;
            height: 100px;
            top: 20%;
            right: 15%;
            transform: rotate(45deg);
            animation: float 6s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: rotate(45deg) translateY(0);
            }

            50% {
                transform: rotate(45deg) translateY(-20px);
            }
        }

        /* --- CONTENT STYLING --- */
        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 0;
            position: relative;
            z-index: 1;
            width: 100%;
        }

        .brand {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            letter-spacing: 15px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-align: center;
            opacity: 0.9;
            width: 100%;
        }

        .tagline {
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
            font-weight: 300;
            margin-bottom: 40px;
            text-align: center;
            width: 100%;
            line-height: 1.6;
        }

        /* The fix for your name */
        .no-break {
            white-space: nowrap;
        }

        .section-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 8px;
            margin-bottom: 50px;
            text-transform: uppercase;
            color: #00bcd4;
        }

        /* --- SHOWCASE --- */
        .showcase-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .video-scroll-container {
            display: flex;
            gap: 40px;
            width: 100%;
            overflow-x: auto;
            padding: 20px 0;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            scroll-behavior: smooth;
        }

            .video-scroll-container::-webkit-scrollbar {
                display: none;
            }

            .video-scroll-container::before,
            .video-scroll-container::after {
                content: '';
                flex: 0 0 calc(50vw - 400px);
                background: rgba(255, 255, 255, 0.02);
                backdrop-filter: blur(5px);
                pointer-events: none;
            }

        .video-item {
            flex: 0 0 800px;
            aspect-ratio: 16 / 9;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            scroll-snap-align: center;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.3;
            will-change: transform, opacity;
        }

            .video-item.is-active {
                opacity: 1;
                border-color: #00bcd4;
                transform: scale(1.02);
            }

            .video-item video {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        .nav-arrow {
            position: absolute;
            top: 40%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #00bcd4;
            font-size: 4.5rem;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s ease;
            opacity: 0.4;
            user-select: none;
        }

            .nav-arrow:hover {
                opacity: 1;
                text-shadow: 0 0 20px #00bcd4;
            }

        .arrow-left {
            left: 4vw;
        }

        .arrow-right {
            right: 4vw;
        }

        .fixed-caption {
            margin-top: 40px;
            text-align: center;
        }

        .project-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .project-desc {
            font-size: 0.9rem;
            color: #666;
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* --- CONTACT --- */
        .contact-box {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            width: calc(100% - 40px);
            max-width: 600px;
            text-align: center;
        }

        .email-link {
            display: inline-block;
            margin-top: 30px;
            padding: 18px 40px;
            border: 1px solid #00bcd4;
            color: #00bcd4;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s ease;
        }

            .email-link:hover {
                background: #00bcd4;
                color: #000;
            }

        footer {
            padding: 60px 20px;
            text-align: center;
            font-size: 0.65rem;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- MOBILE OPTIMIZATIONS --- */
        @media (max-width: 768px) {
            .brand {
                letter-spacing: 4px;
                padding: 0 15px;
            }

            .tagline {
                letter-spacing: 2px;
                font-size: 0.8rem;
                padding: 0 20px;
            }

            .accent {
                display: none;
            }

            .video-item {
                flex: 0 0 85vw;
            }

            .video-scroll-container::before,
            .video-scroll-container::after {
                flex: 0 0 7.5vw;
            }

            .nav-arrow {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="background-elements">
        <div class="grid-overlay"></div>
        <div class="gradient-sphere"></div>
    </div>

    <div class="accent"></div>

    <!-- HERO -->
    <section>
        <div class="brand">ALLPOLY</div>
        <div class="tagline">Animation & Game Dev by <span class="no-break">Toupoc Allen</span></div>
    </section>

    <!-- SHOWCASE -->
    <section id="work">
        <h2 class="section-title">Showcase</h2>

        <div class="showcase-wrapper">
            <button class="nav-arrow arrow-left" onclick="scrollShowcase(-1)" aria-label="Previous">&#8249;</button>
            <button class="nav-arrow arrow-right" onclick="scrollShowcase(1)" aria-label="Next">&#8250;</button>

            <div class="video-scroll-container" id="videoSlider">
                <div class="video-item"><video muted loop playsinline preload="metadata"><source src="videos/01.mp4" type="video/mp4"></video></div>
                <div class="video-item"><video muted loop playsinline preload="metadata"><source src="videos/06.mp4" type="video/mp4"></video></div>
                <div class="video-item"><video muted loop playsinline preload="metadata"><source src="videos/02.mp4" type="video/mp4"></video></div>
                <div class="video-item"><video muted loop playsinline preload="metadata"><source src="videos/03.mp4" type="video/mp4"></video></div>
                <div class="video-item"><video muted loop playsinline preload="metadata"><source src="videos/04.mp4" type="video/mp4"></video></div>
                <div class="video-item"><video muted loop playsinline preload="metadata"><source src="videos/09.mp4" type="video/mp4"></video></div>
                <div class="video-item"><video muted loop playsinline preload="metadata"><source src="videos/05.mp4" type="video/mp4"></video></div>
                <div class="video-item"><video muted loop playsinline preload="metadata"><source src="videos/07.mp4" type="video/mp4"></video></div>
                <div class="video-item"><video muted loop playsinline preload="metadata"><source src="videos/08.mp4" type="video/mp4"></video></div>
                <div class="video-item"><video muted loop playsinline preload="metadata"><source src="videos/10.mp4" type="video/mp4"></video></div>
            </div>

            <div class="fixed-caption">
                <div class="project-title">Legacy Reels</div>
                <div class="project-desc">Years of Client Satisfaction</div>
            </div>
        </div>
    </section>

    <!-- CONTACT -->
    <section id="contact">
        <div class="contact-box">
            <h2 class="section-title">Contact</h2>
            <p style="color: #888;">Let's make something great.</p>
            <a href="mailto:toupoc_allen@allpoly.net" class="email-link">Get in Touch</a>
        </div>
    </section>

    <footer>
        &copy; 2026 AllPoly LLC. ALL RIGHTS RESERVED.
    </footer>

    <script>
        function scrollShowcase(direction) {
            const slider = document.getElementById('videoSlider');
            const item = slider.querySelector('.video-item');
            if (!item) return;
            const itemWidth = item.offsetWidth + 40;
            slider.scrollBy({ left: direction * itemWidth, behavior: 'smooth' });
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-active');
                    if (video) video.play().catch(() => { });
                } else {
                    entry.target.classList.remove('is-active');
                    if (video) video.pause();
                }
            });
        }, {
            root: document.getElementById('videoSlider'),
            threshold: 0.6
        });

        document.querySelectorAll('.video-item').forEach(item => observer.observe(item));
    </script>
</body>
</html>
