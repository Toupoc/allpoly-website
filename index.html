<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllPoly | Animation & Game Dev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Syncopate:wght@700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- INTEGRATED ARTISTIC BACKGROUND --- */
        .background-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .grid-overlay {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
        }

        .gradient-sphere {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(123, 31, 162, 0.15) 0%, rgba(0, 188, 212, 0.05) 50%, rgba(5, 5, 5, 0) 70%);
            filter: blur(80px);
            animation: pulse 10s infinite alternate;
        }

        .accent {
            position: fixed;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100px;
            height: 100px;
            top: 20%;
            right: 15%;
            transform: rotate(45deg);
            animation: float 6s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.8;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: rotate(45deg) translateY(0);
            }

            50% {
                transform: rotate(45deg) translateY(-20px);
            }
        }
        /* --- END BACKGROUND ELEMENTS --- */

        /* Content Styling */
        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
            position: relative;
            z-index: 1; /* Stay above background */
        }

        .brand {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            letter-spacing: 15px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #666666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-align: center;
            opacity: 0.9;
        }

        .tagline {
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
            font-weight: 300;
            margin-bottom: 40px;
            text-align: center;
        }

        .section-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 8px;
            margin-bottom: 50px;
            text-transform: uppercase;
            color: #00bcd4;
        }

        .video-grid {
            display: block;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .video-placeholder {
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .contact-box {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .email-link {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            border: 1px solid #00bcd4;
            color: #00bcd4;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

            .email-link:hover {
                background: #00bcd4;
                color: #000;
                box-shadow: 0 0 20px rgba(0, 188, 212, 0.4);
            }

        footer {
            padding: 40px;
            text-align: center;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 600px) {
            .brand {
                letter-spacing: 6px;
            }

            .contact-box {
                padding: 30px 20px;
            }

            .accent {
                display: none;
            }
            /* Clean up mobile view */
        }
    </style>
</head>
<body>
    <!-- Background Wrapper -->
    <div class="background-elements">
        <div class="grid-overlay"></div>
        <div class="gradient-sphere"></div>
    </div>

    <!-- Floating Square Accent -->
    <div class="accent"></div>

    <!-- HERO -->
    <section>
        <div class="brand">ALLPOLY</div>
        <div class="tagline">Animation & Game Dev Services</div>
        <div style="margin-top: 20px; color: #00bcd4; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase;">Scroll to Explore</div>
    </section>

    <!-- SHOWCASE -->
    <section id="work">
        <h2 class="section-title">Showcase</h2>
        <div class="video-grid">
            <div class="video-container">
                <div class="video-placeholder">Project Alpha - Animation Reel</div>
            </div>
            <div class="video-container">
                <div class="video-placeholder">Project Beta - Game Mechanics</div>
            </div>
        </div>
    </section>

    <!-- CONTACT -->
    <section id="contact">
        <div class="contact-box">
            <h2 class="section-title" style="margin-bottom: 20px;">Contact</h2>
            <p style="color: #888; line-height: 1.6; font-weight: 300;">Have a project in mind? Let's build something unique together.</p>
            <a href="mailto:hello@allpoly.net" class="email-link">Get in Touch</a>
        </div>
    </section>

    <footer>
        &copy; 2026 AllPoly LLC. ALL RIGHTS RESERVED.
    </footer>
</body>
</html>
